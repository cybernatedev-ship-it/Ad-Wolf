name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  package-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Build release
        run: cargo build --release
      - name: Build .deb
        run: cargo deb --output artifacts/dns-filter.deb
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: dns-filter-amd64.deb
          path: artifacts/dns-filter.deb

  package-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm
      - name: Build release
        run: cargo build --release
      - name: Build .rpm
        run: cargo generate-rpm --output artifacts/dns-filter.rpm
      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: dns-filter-x86_64.rpm
          path: artifacts/dns-filter.rpm

  package-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install cargo-wix
        run: cargo install cargo-wix
      - name: Build release
        run: cargo build --release
      - name: Build .msi
        run: cargo wix --no-banner --output artifacts/dns-filter.msi
      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: dns-filter-x86_64.msi
          path: artifacts/dns-filter.msi

  package-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build release
        run: cargo build --release
      - name: Build .pkg
        run: |
          mkdir -p artifacts/pkgroot/usr/local/bin
          cp target/release/dns-filter artifacts/pkgroot/usr/local/bin/
          pkgbuild --root artifacts/pkgroot --identifier com.ad-wolf.dns-filter --version 0.1.0 --install-location / artifacts/dns-filter.pkg
      - name: Upload .pkg
        uses: actions/upload-artifact@v4
        with:
          name: dns-filter-x86_64.pkg
          path: artifacts/dns-filter.pkg

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, package-deb, package-rpm, package-msi, package-dmg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date +%Y%m%d.%H%M)"
          gh release create "$TAG" \
            --title "Ad-Wolf $TAG" \
            --notes "Auto-built release from main branch." \
            --generate-notes \
            artifacts/*
