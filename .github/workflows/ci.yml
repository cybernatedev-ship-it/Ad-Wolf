name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (exclude GUI — needs sidecar binary)
        run: cargo clippy --workspace --exclude ad-wolf-gui -- -D warnings
      - name: Build (exclude GUI — needs sidecar binary)
        run: cargo build --workspace --exclude ad-wolf-gui
      - name: Test (exclude GUI — needs sidecar binary)
        run: cargo test --workspace --exclude ad-wolf-gui

  package-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build daemon binary
        run: cargo build --release --bin dns-filter
        working-directory: ${{ github.workspace }}
      - name: Copy daemon to Tauri sidecar
        run: |
          mkdir -p gui/src-tauri/binaries
          TARGET_TRIPLE=$(rustc -vV | awk '/^host/ { print $2 }')
          cp target/release/dns-filter "gui/src-tauri/binaries/dns-filter-${TARGET_TRIPLE}"
      - name: Install frontend deps
        run: npm install
        working-directory: gui
      - name: Build Tauri app (GUI + CLI daemon)
        run: cargo tauri build
        working-directory: gui/src-tauri
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ad-wolf-linux
          path: gui/src-tauri/target/release/bundle/

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build daemon binary
        run: cargo build --release --bin dns-filter
        working-directory: ${{ github.workspace }}
      - name: Copy daemon to Tauri sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path gui/src-tauri/binaries
          $triple = (rustc -vV) | Select-String "^host:" | ForEach-Object { $_.Line.Split(" ")[1] }
          Copy-Item target/release/dns-filter.exe "gui/src-tauri/binaries/dns-filter-$triple.exe"
      - name: Install frontend deps
        run: npm install
        working-directory: gui
      - name: Build Tauri app (GUI + CLI daemon)
        run: cargo tauri build
        working-directory: gui/src-tauri
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ad-wolf-windows
          path: gui/src-tauri/target/release/bundle/

  package-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build daemon binary
        run: cargo build --release --bin dns-filter
        working-directory: ${{ github.workspace }}
      - name: Copy daemon to Tauri sidecar
        run: |
          mkdir -p gui/src-tauri/binaries
          TARGET_TRIPLE=$(rustc -vV | awk '/^host/ { print $2 }')
          cp target/release/dns-filter "gui/src-tauri/binaries/dns-filter-${TARGET_TRIPLE}"
      - name: Install frontend deps
        run: npm install
        working-directory: gui
      - name: Build Tauri app (GUI + CLI daemon)
        run: cargo tauri build
        working-directory: gui/src-tauri
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ad-wolf-macos
          path: gui/src-tauri/target/release/bundle/

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, package-linux, package-windows, package-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date +%Y%m%d.%H%M)"
          gh release create "$TAG" \
            --title "Ad-Wolf $TAG" \
            --notes "Auto-built release from main branch." \
            --generate-notes \
            artifacts/*
